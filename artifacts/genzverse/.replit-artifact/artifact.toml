kind = "web"
previewPath = "/"
title = "GenZVerse"
version = "1.0.0"
id = "artifacts/genzverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21292

[services.development]
run = "pnpm --filter @workspace/genzverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/genzverse", "run", "build" ]
publicDir = "artifacts/genzverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21292"
BASE_PATH = "/"
